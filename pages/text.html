<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta
         name="description"
         content="Danh sách sản phẩm với thiết kế product-card."
      />
      <title>Danh sách sản phẩm</title>
      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
         }

         h1 {
            text-align: center;
            margin: 20px 0;
         }

         .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
         }

         .product-card {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
         }

         .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
         }

         .product-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
         }

         .product-card-content {
            padding: 16px;
         }

         .product-card h2 {
            font-size: 20px;
            margin-bottom: 10px;
         }

         .product-card p {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
         }

         .product-card .price {
            font-size: 18px;
            font-weight: bold;
            color: #2196f3;
            margin-bottom: 20px;
         }

         .product-card button {
            background-color: #2196f3;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            text-align: center;
         }

         .product-card button:hover {
            background-color: #1976d2;
         }
      </style>
   </head>
   <body>
      <h1>Danh sách sản phẩm</h1>
      <div class="product-list" id="product-list">
        
      </div>

      <script type="module" src="../assets/js/product.js"></script>
      <script type="module">
        import {renderProducts} from "../assets/js/product.js";

        renderProducts("product-list")
      </script>
   </body>
</html>
