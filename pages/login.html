<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <div class="layer">
      <form action="" id="login-form">
        <h1>Đăng nhập</h1>
        <label for="Username" class="labut">Email:</label>
        <input
          type="text"
          name="Username"
          id="email"
          class="labut"
          placeholder="Nhập email của bạn"
        />
        <span style="color: red;font-size:12px;" id="email-error"> </span>
        <label for="password" class="labut">Password:</label>
        <input
          type="password"
          name="password"
          id="password"
          class="labut"
          placeholder="Nhập mật khẩu"
        /><span style="color: red;font-size:12px;" id="pass-error"> </span>
        
        <button type="submit" class="login-btn" id="login-btn">Đăng nhập</button>
        <label for="register"
          >Chưa có tài khoản?<span><a href="./register.html">Đăng ký ngay</a></span></label>
          <button type="button" id="google-login-btn">
  Đăng nhập bằng Google
</button>
      </form>
    </div>
    <script type="module" src="../assets/js/firebase_config.js"></script>
    <script type="module" src="../assets/js/login.js"></script>
  </body>
</html>
